name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install yamllint
        run: |
          python -m pip install --upgrade pip
          pip install yamllint

      - name: Run package shape check
        run: |
          scripts/check-package-shape.sh

      - name: Run yamllint
        run: |
          yamllint home-assistant/packages/good_morning
